<index. html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊記帳本</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:15px}
h2{font-size:17px;font-weight:600}
.wrap{max-width:700px;margin:0 auto;padding:20px 16px 80px}

/* tabs */
.tabbar{display:flex;background:#fff;border-radius:14px;padding:4px;gap:2px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tabbar button{flex:1;border:none;background:none;padding:8px 4px;font-size:13px;border-radius:10px;cursor:pointer;color:#8e8e93;font-family:inherit}
.tabbar button.act{background:#007aff;color:#fff;font-weight:600}

/* pages */
.page{display:none}
.page.act{display:block}

/* card */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* form */
.row{margin-bottom:12px}
.row label{display:block;font-size:13px;color:#8e8e93;margin-bottom:4px}
.row input,.row select,.row textarea{width:100%;border:1px solid #d1d1d6;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fff;color:#1c1c1e;-webkit-appearance:none}
.row textarea{min-height:60px;resize:vertical}
.row input:focus,.row select:focus{outline:none;border-color:#007aff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:15px;font-family:inherit;cursor:pointer;border:1px solid #d1d1d6;background:#fff;color:#1c1c1e}
.btn.blue{background:#007aff;color:#fff;border-color:#007aff}
.btn.red{color:#ff3b30;border-color:#ff3b30}
.btn.sm{padding:6px 12px;font-size:13px}

/* metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.met{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.met .lbl{font-size:12px;color:#8e8e93;margin-bottom:4px}
.met .val{font-size:20px;font-weight:600}
.met .sub{font-size:12px;color:#8e8e93;margin-top:2px}

/* progress */
.progwrap{background:#f2f2f7;border-radius:6px;height:10px;overflow:hidden;margin:8px 0}
.progbar{height:100%;border-radius:6px;transition:width .3s}

/* expense row */
.exrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f2f2f7}
.exrow:last-child{border-bottom:none}
.exico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exinfo{flex:1;min-width:0}
.extitle{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exmeta{font-size:12px;color:#8e8e93;margin-top:2px}
.examtw{font-size:15px;font-weight:600;text-align:right}
.examt2{font-size:12px;color:#8e8e93;text-align:right}

/* badge */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
.g-badge{background:#d1f0d1;color:#1a5c1a}
.y-badge{background:#fde8c0;color:#7a4800}
.r-badge{background:#ffd6d6;color:#8b0000}
.b-badge{background:#dde8ff;color:#003399}

/* tag buttons */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tags button{border:1px solid #d1d1d6;border-radius:20px;padding:5px 12px;font-size:13px;background:#fff;cursor:pointer;color:#1c1c1e;font-family:inherit}
.tags button.sel{background:#007aff;color:#fff;border-color:#007aff}

/* modal */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;padding:20px 16px;display:none}
.modal{background:#fff;border-radius:18px;padding:20px;max-width:560px;margin:0 auto}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px}

/* hero */
.hero{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;padding:18px;margin-bottom:12px;color:#fff}
.hero .name{font-size:20px;font-weight:600}
.hero .dates{font-size:13px;opacity:.85;margin-top:4px}

.empty{text-align:center;padding:40px 20px;color:#8e8e93;font-size:14px}
.sechdr{font-size:17px;font-weight:600;margin-bottom:12px}
.divider{height:1px;background:#f2f2f7;margin:4px 0}
.ratehint{font-size:12px;color:#007aff;margin-top:4px;cursor:pointer}
.chkrow{display:flex;align-items:center;gap:8px;font-size:14px;color:#3c3c43;margin-top:4px}
.chkrow input[type=checkbox]{width:auto}

@media(max-width:400px){.g2,.g3{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:14px">
    <div style="font-size:22px;font-weight:700">旅遊記帳本 ✈️</div>
    <div style="font-size:13px;color:#8e8e93;margin-top:2px">資料儲存於本機，離線可用</div>
  </div>

  <div class="tabbar">
    <button class="act" id="tb0" onclick="showPage(0)">儀表板</button>
    <button id="tb1" onclick="showPage(1)">記帳</button>
    <button id="tb2" onclick="showPage(2)">分析</button>
    <button id="tb3" onclick="showPage(3)">分帳</button>
    <button id="tb4" onclick="showPage(4)">旅程</button>
  </div>

  <!-- 0 儀表板 -->
  <div class="page act" id="pg0">
    <div id="notrip" class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:12px">🗺️</div>
      <div style="font-size:17px;font-weight:600;margin-bottom:8px">尚未建立旅程</div>
      <div style="font-size:14px;color:#8e8e93;margin-bottom:16px">請先建立旅遊計畫</div>
      <button class="btn blue" onclick="showPage(4)">＋ 建立旅程</button>
    </div>
    <div id="dashdata" style="display:none">
      <div class="hero">
        <div class="name" id="dn"></div>
        <div class="dates" id="dd"></div>
      </div>
      <div class="metrics">
        <div class="met"><div class="lbl">總預算</div><div class="val" id="dm1">—</div></div>
        <div class="met"><div class="lbl">已花費</div><div class="val" id="dm2">—</div></div>
        <div class="met"><div class="lbl">剩餘預算</div><div class="val" id="dm3">—</div></div>
        <div class="met"><div class="lbl">今日可用</div><div class="val" id="dm4">—</div><div class="sub" id="dm4s"></div></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-weight:600">預算進度</span>
          <span id="dpct" class="badge g-badge">0%</span>
        </div>
        <div class="progwrap"><div class="progbar" id="dbar" style="width:0;background:#34c759"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#8e8e93;margin-top:4px">
          <span>警示 <span id="dwy">80%</span> ／超支 <span id="dwr">100%</span></span>
          <span id="dof"></span>
        </div>
      </div>
      <div class="card">
        <div class="sechdr">最近紀錄</div>
        <div id="drecent"><div class="empty">尚無紀錄</div></div>
        <div style="text-align:right;margin-top:8px">
          <button class="btn sm" onclick="showPage(1)">查看全部 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 1 記帳 -->
  <div class="page" id="pg1">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="sechdr" style="margin:0">花費紀錄</div>
      <div style="display:flex;gap:8px">
        <button class="btn sm blue" onclick="openAdd()">＋ 新增</button>
        <button class="btn sm" onclick="doCSV()">⬇ CSV</button>
      </div>
    </div>
    <div class="card" style="padding:10px 14px;margin-bottom:10px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="fs" placeholder="搜尋..." style="flex:1;min-width:120px;border:1px solid #d1d1d6;border-radius:8px;padding:7px 10px;font-size:14px;font-family:inherit" oninput="renderList()">
        <select id="fc" style="border:1px solid #d1d1d6;border-radius:8px;padding:7px 10px;font-size:14px;font-family:inherit;background:#fff;-webkit-appearance:none" onchange="renderList()">
          <option value="">全部類別</option>
        </select>
      </div>
    </div>
    <div class="card"><div id="explist"><div class="empty">尚無花費紀錄</div></div></div>
  </div>

  <!-- 2 分析 -->
  <div class="page" id="pg2">
    <div class="sechdr">分析看板</div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">類別分佈</div>
      <div id="catpie"></div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">付款方式</div>
      <div id="paybd"></div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">每日動態預算</div>
      <div id="daybd"></div>
    </div>
  </div>

  <!-- 3 分帳 -->
  <div class="page" id="pg3">
    <div class="sechdr">多人分帳</div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">成員</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="text" id="mi" placeholder="輸入名字" style="flex:1;border:1px solid #d1d1d6;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit">
        <button class="btn blue" onclick="addMember()">新增</button>
      </div>
      <div id="mlist" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">結算</div>
      <div id="settle"><div class="empty">新增成員並記錄分帳花費後顯示</div></div>
    </div>
  </div>

  <!-- 4 旅程設定 -->
  <div class="page" id="pg4">
    <div class="sechdr">旅程設定</div>
    <div class="card">
      <div class="row"><label>旅程名稱</label><input type="text" id="sn" placeholder="例：2026 東京五日遊"></div>
      <div class="g2">
        <div class="row"><label>出發日期</label><input type="date" id="ss"></div>
        <div class="row"><label>結束日期</label><input type="date" id="se"></div>
      </div>
      <div class="g2">
        <div class="row"><label>主貨幣</label>
          <select id="sc">
            <option value="TWD">TWD 新台幣</option>
            <option value="HKD">HKD 港幣</option>
            <option value="CNY">CNY 人民幣</option>
            <option value="USD">USD 美元</option>
            <option value="JPY">JPY 日圓</option>
            <option value="SGD">SGD 新幣</option>
          </select>
        </div>
        <div class="row"><label>總預算</label><input type="number" id="sb" placeholder="60000"></div>
      </div>
      <div class="g2">
        <div class="row"><label>黃色警示 %</label><input type="number" id="sy" value="80"></div>
        <div class="row"><label>紅色超支 %</label><input type="number" id="sr" value="100"></div>
      </div>
      <button class="btn blue" onclick="saveTrip()">✓ 儲存設定</button>
      <span id="savedmsg" style="display:none;margin-left:10px;font-size:13px;color:#34c759">✓ 已儲存</span>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">花費類別</div>
      <div class="tags" id="cattags"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input type="text" id="newcat" placeholder="新增類別" style="flex:1;border:1px solid #d1d1d6;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit">
        <button class="btn" onclick="addCat()">＋</button>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px">資料</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="doCSV()">匯出 CSV</button>
        <button class="btn red" onclick="clearAll()">清除資料</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增/編輯 modal -->
<div id="overlay" class="overlay">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 id="mtitle" style="margin:0">新增花費</h3>
      <button onclick="closeModal()" style="border:none;background:none;font-size:22px;cursor:pointer;color:#8e8e93;padding:0">✕</button>
    </div>

    <div class="g3">
      <div class="row"><label>外幣金額</label><input type="number" id="mfgn" placeholder="0" oninput="calcTWD()"></div>
      <div class="row"><label>幣別</label>
        <select id="mcur" onchange="fetchRate()">
          <option>JPY</option><option>USD</option><option>EUR</option>
          <option>KRW</option><option>GBP</option><option>HKD</option>
          <option>CNY</option><option>THB</option><option>SGD</option>
          <option>AUD</option><option>TWD</option>
        </select>
      </div>
      <div class="row">
        <label>匯率 <span id="rsrc" style="font-size:11px;color:#007aff"></span></label>
        <input type="number" id="mrate" step="0.0001" placeholder="0.2174" oninput="calcTWD()">
        <div class="ratehint" onclick="fetchRate(1)">↻ 抓取即時匯率</div>
      </div>
    </div>

    <div class="row">
      <label>折合主貨幣（<span id="mhc">TWD</span>）</label>
      <input type="number" id="mtwd" placeholder="自動計算" style="background:#f2f2f7">
    </div>

    <div class="g2">
      <div class="row"><label>日期</label><input type="date" id="mdate"></div>
      <div class="row"><label>時間</label><input type="time" id="mtime"></div>
    </div>

    <div class="row">
      <label>類別</label>
      <div class="tags" id="catsel"></div>
    </div>

    <div class="g2">
      <div class="row"><label>付款方式</label>
        <select id="mpay">
          <option>現金</option><option>信用卡 A</option><option>信用卡 B</option><option>電子支付</option>
        </select>
      </div>
      <div class="row"><label>地點／商家</label><input type="text" id="mplace" placeholder="例：一蘭拉麵"></div>
    </div>

    <div class="row"><label>備註</label><textarea id="mnote" placeholder="補充說明..."></textarea></div>

    <div class="row">
      <label>跨日平攤</label>
      <div class="chkrow">
        <input type="checkbox" id="mspread" onchange="toggleSpread(this.checked)">
        <span>平攤多天（住宿等）</span>
      </div>
      <div id="spreadrow" style="display:none;margin-top:8px;display:none">
        <input type="number" id="mspd" value="2" min="1" style="width:80px;border:1px solid #d1d1d6;border-radius:8px;padding:8px;font-size:14px">
        <span style="font-size:13px;color:#8e8e93;margin-left:6px">天</span>
      </div>
    </div>

    <div class="row">
      <label>分帳</label>
      <div class="chkrow">
        <input type="checkbox" id="msplit" onchange="toggleSplit(this.checked)">
        <span>此筆需分攤</span>
      </div>
      <div id="splitwho" style="display:none;margin-top:10px">
        <div class="row"><label>墊款人</label><select id="mpayer"></select></div>
        <div class="row"><label>分攤成員</label><div id="msplm"></div></div>
      </div>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;padding-top:12px;border-top:1px solid #f2f2f7">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn blue" onclick="saveExp()">✓ 儲存</button>
    </div>
  </div>
</div>

<script>
var DATA = {
  trip: null,
  exps: [],
  cats: ['機票','住宿','交通','餐飲','購物','門票/娛樂','保險/行政','其他'],
  members: [],
  eid: null
};

var COLORS = {
  '機票':'#5856d6','住宿':'#34c759','交通':'#007aff',
  '餐飲':'#ff9500','購物':'#ff2d55','門票/娛樂':'#af52de',
  '保險/行政':'#8e8e93','其他':'#30b0c7'
};
var EMOJIS = {
  '機票':'✈️','住宿':'🏠','交通':'🚗','餐飲':'🍜',
  '購物':'🛍️','門票/娛樂':'🎟️','保險/行政':'📋','其他':'💰'
};
var PAYC = {'現金':'#34c759','信用卡 A':'#5856d6','信用卡 B':'#007aff','電子支付':'#ff9500'};

var selCat = null;

function save() { try { localStorage.setItem('tt5', JSON.stringify(DATA)); } catch(e) {} }
function load() {
  try {
    var raw = localStorage.getItem('tt5');
    if (raw) {
      var d = JSON.parse(raw);
      if (d.trip) DATA.trip = d.trip;
      if (d.exps) DATA.exps = d.exps;
      if (d.cats) DATA.cats = d.cats;
      if (d.members) DATA.members = d.members;
    }
  } catch(e) {}
}

function showPage(n) {
  for (var i = 0; i < 5; i++) {
    document.getElementById('pg' + i).className = 'page' + (i === n ? ' act' : '');
    document.getElementById('tb' + i).className = i === n ? 'act' : '';
  }
  if (n === 2) renderAnalysis();
  if (n === 3) renderSplit();
}

function fmt(n) {
  var sym = {'TWD':'NT$','HKD':'HK$','CNY':'¥','USD':'$','JPY':'¥','SGD':'S$'};
  var s = (DATA.trip && sym[DATA.trip.currency]) ? sym[DATA.trip.currency] : (DATA.trip ? DATA.trip.currency + '$' : 'NT$');
  return s + Math.round(n).toLocaleString();
}

function totalSpent() {
  var s = 0;
  for (var i = 0; i < DATA.exps.length; i++) s += parseFloat(DATA.exps[i].twd) || 0;
  return s;
}

function tripDays() {
  if (!DATA.trip) return 1;
  var ms = new Date(DATA.trip.end) - new Date(DATA.trip.start);
  return Math.max(1, Math.round(ms / 86400000) + 1);
}

// ── 儀表板 ──
function renderDash() {
  var nd = document.getElementById('notrip');
  var dd = document.getElementById('dashdata');
  if (!DATA.trip) { nd.style.display = 'block'; dd.style.display = 'none'; return; }
  nd.style.display = 'none'; dd.style.display = 'block';

  var t = DATA.trip;
  document.getElementById('dn').innerHTML = t.name;
  var days = tripDays();
  document.getElementById('dd').innerHTML = t.start.replace(/-/g,'/') + ' – ' + t.end.replace(/-/g,'/') + ' · ' + days + ' 天';
  document.getElementById('dwy').innerHTML = t.warnY + '%';
  document.getElementById('dwr').innerHTML = t.warnR + '%';

  var spent = totalSpent();
  var remain = t.budget - spent;
  var pct = t.budget > 0 ? (spent / t.budget * 100) : 0;

  document.getElementById('dm1').innerHTML = fmt(t.budget);
  document.getElementById('dm2').innerHTML = fmt(spent);
  document.getElementById('dm3').innerHTML = fmt(remain);
  document.getElementById('dof').innerHTML = fmt(spent) + ' / ' + fmt(t.budget);

  var today = new Date(); today.setHours(0,0,0,0);
  var ed = new Date(t.end); ed.setHours(23,59,59,999);
  var sd = new Date(t.start); sd.setHours(0,0,0,0);
  var remDays;
  if (today < sd) remDays = days;
  else if (today > ed) remDays = 1;
  else remDays = Math.max(1, Math.round((ed - today) / 86400000) + 1);

  document.getElementById('dm4').innerHTML = fmt(Math.max(0, Math.round(remain / remDays)));
  document.getElementById('dm4s').innerHTML = '剩餘 ' + remDays + ' 天平均';

  var bar = document.getElementById('dbar');
  bar.style.width = Math.min(100, pct).toFixed(1) + '%';
  bar.style.background = pct >= t.warnR ? '#ff3b30' : pct >= t.warnY ? '#ff9500' : '#34c759';

  var badge = document.getElementById('dpct');
  badge.innerHTML = pct.toFixed(1) + '%';
  badge.className = 'badge ' + (pct >= t.warnR ? 'r-badge' : pct >= t.warnY ? 'y-badge' : 'g-badge');

  var sorted = DATA.exps.slice().sort(function(a,b) { return (b.dt||'') > (a.dt||'') ? 1 : -1; });
  var recent = sorted.slice(0, 5);
  var el = document.getElementById('drecent');
  if (recent.length === 0) { el.innerHTML = '<div class="empty">尚無紀錄</div>'; return; }
  el.innerHTML = recent.map(exRowHTML).join('');
}

function exRowHTML(e) {
  var col = COLORS[e.cat] || '#8e8e93';
  var em = EMOJIS[e.cat] || '💰';
  var hc = DATA.trip ? DATA.trip.currency : 'TWD';
  var orig = (e.cur !== hc) ? ('<div class="examt2">' + e.fgn + ' ' + e.cur + '</div>') : '';
  return '<div class="exrow">' +
    '<div class="exico" style="background:' + col + '22">' + em + '</div>' +
    '<div class="exinfo">' +
      '<div class="extitle">' + (e.place || e.cat) + '</div>' +
      '<div class="exmeta">' + e.date + ' · ' + e.pay + ' · <span class="badge b-badge" style="font-size:10px">' + e.cat + '</span></div>' +
    '</div>' +
    '<div>' +
      '<div class="examtw">' + fmt(e.twd) + '</div>' + orig +
    '</div>' +
    '<button class="btn sm" style="margin-left:4px" onclick="openEdit(\'' + e.id + '\')">✏️</button>' +
    '<button class="btn sm red" style="margin-left:4px;border:none" onclick="delExp(\'' + e.id + '\')">🗑</button>' +
    '</div>';
}

// ── 花費列表 ──
function renderList() {
  var s = document.getElementById('fs').value || '';
  var c = document.getElementById('fc').value || '';
  var list = DATA.exps.slice().sort(function(a,b) { return (b.dt||'') > (a.dt||'') ? 1 : -1; });
  if (s) list = list.filter(function(e) { return ((e.place||'') + ' ' + (e.note||'')).toLowerCase().indexOf(s.toLowerCase()) >= 0; });
  if (c) list = list.filter(function(e) { return e.cat === c; });
  var el = document.getElementById('explist');
  el.innerHTML = list.length === 0 ? '<div class="empty">尚無花費紀錄</div>' : list.map(exRowHTML).join('');

  var fc = document.getElementById('fc');
  var cv = fc.value;
  fc.innerHTML = '<option value="">全部類別</option>' + DATA.cats.map(function(c) {
    return '<option' + (c === cv ? ' selected' : '') + '>' + c + '</option>';
  }).join('');
}

function delExp(id) {
  if (!confirm('刪除此筆紀錄？')) return;
  DATA.exps = DATA.exps.filter(function(e) { return e.id !== id; });
  save(); renderAll();
}

// ── 分析 ──
function renderAnalysis() {
  renderCatPie(); renderPayBd(); renderDayBd();
}

function renderCatPie() {
  var tot = {};
  for (var i = 0; i < DATA.exps.length; i++) {
    var e = DATA.exps[i];
    tot[e.cat] = (tot[e.cat] || 0) + (parseFloat(e.twd) || 0);
  }
  var total = 0;
  for (var k in tot) total += tot[k];
  var el = document.getElementById('catpie');
  if (total === 0) { el.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  var html = '';
  var keys = Object.keys(tot).sort(function(a,b) { return tot[b]-tot[a]; });
  for (var i = 0; i < keys.length; i++) {
    var cat = keys[i];
    var v = tot[cat];
    var pct = (v / total * 100).toFixed(1);
    var col = COLORS[cat] || '#8e8e93';
    html += '<div style="margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">' +
        '<span>' + (EMOJIS[cat]||'') + ' ' + cat + '</span>' +
        '<span style="font-weight:600">' + fmt(v) + ' (' + pct + '%)</span>' +
      '</div>' +
      '<div style="background:#f2f2f7;border-radius:4px;height:8px;overflow:hidden">' +
        '<div style="width:' + pct + '%;height:100%;background:' + col + ';border-radius:4px"></div>' +
      '</div></div>';
  }
  el.innerHTML = html;
}

function renderPayBd() {
  var tot = {};
  for (var i = 0; i < DATA.exps.length; i++) {
    var e = DATA.exps[i];
    tot[e.pay] = (tot[e.pay] || 0) + (parseFloat(e.twd) || 0);
  }
  var total = 0;
  for (var k in tot) total += tot[k];
  var el = document.getElementById('paybd');
  if (total === 0) { el.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  var html = '';
  var keys = Object.keys(tot).sort(function(a,b) { return tot[b]-tot[a]; });
  for (var i = 0; i < keys.length; i++) {
    var pay = keys[i];
    var v = tot[pay];
    var pct = (v / total * 100).toFixed(1);
    var col = PAYC[pay] || '#8e8e93';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f2f2f7">' +
      '<div><div style="font-size:14px">' + pay + '</div>' +
      '<div style="height:5px;width:' + pct + '%;min-width:4px;background:' + col + ';border-radius:3px;margin-top:4px"></div></div>' +
      '<div style="text-align:right"><div style="font-weight:600">' + fmt(v) + '</div>' +
      '<div style="font-size:12px;color:#8e8e93">' + pct + '%</div></div></div>';
  }
  el.innerHTML = html;
}

function renderDayBd() {
  if (!DATA.trip) { document.getElementById('daybd').innerHTML = '<div class="empty">設定旅程後顯示</div>'; return; }
  var sd = new Date(DATA.trip.start), ed = new Date(DATA.trip.end);
  var days = [];
  var d = new Date(sd);
  while (d <= ed) { days.push(d.toISOString().split('T')[0]); d = new Date(d.getTime() + 86400000); }
  var today = new Date().toISOString().split('T')[0];
  var remain = DATA.trip.budget;
  var html = '';
  for (var i = 0; i < days.length; i++) {
    var day = days[i];
    var alloc = remain / (days.length - i);
    var spent = 0;
    for (var j = 0; j < DATA.exps.length; j++) {
      if (DATA.exps[j].date === day) spent += parseFloat(DATA.exps[j].twd) || 0;
    }
    remain = Math.max(0, remain - spent);
    var over = spent > alloc;
    var isToday = day === today;
    var pct = alloc > 0 ? Math.min(100, spent / alloc * 100) : 0;
    html += '<div style="margin-bottom:12px' + (isToday ? ';background:#f0f8ff;padding:8px;border-radius:10px' : '') + '">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">' +
        '<span style="font-weight:' + (isToday ? '600' : '400') + '">' + day.slice(5) + (isToday ? ' 今天' : '') + '</span>' +
        '<span style="color:' + (over ? '#ff3b30' : '#8e8e93') + '">' + fmt(spent) + ' / ' + fmt(Math.round(alloc)) + '</span>' +
      '</div>' +
      '<div style="background:#f2f2f7;border-radius:4px;height:6px;overflow:hidden">' +
        '<div style="width:' + pct.toFixed(1) + '%;height:100%;background:' + (over ? '#ff3b30' : '#5856d6') + ';border-radius:4px"></div>' +
      '</div></div>';
  }
  document.getElementById('daybd').innerHTML = html;
}

// ── 設定 ──
function fillSettings() {
  if (!DATA.trip) return;
  var t = DATA.trip;
  document.getElementById('sn').value = t.name || '';
  document.getElementById('ss').value = t.start || '';
  document.getElementById('se').value = t.end || '';
  document.getElementById('sc').value = t.currency || 'TWD';
  document.getElementById('sb').value = t.budget || '';
  document.getElementById('sy').value = t.warnY || 80;
  document.getElementById('sr').value = t.warnR || 100;
}

function saveTrip() {
  var n = document.getElementById('sn').value;
  var ss = document.getElementById('ss').value;
  var se = document.getElementById('se').value;
  if (!n || !ss || !se) { alert('請填寫旅程名稱與日期'); return; }
  DATA.trip = {
    name: n, start: ss, end: se,
    currency: document.getElementById('sc').value,
    budget: parseFloat(document.getElementById('sb').value) || 0,
    warnY: parseFloat(document.getElementById('sy').value) || 80,
    warnR: parseFloat(document.getElementById('sr').value) || 100
  };
  save(); renderAll();
  var msg = document.getElementById('savedmsg');
  msg.style.display = 'inline';
  setTimeout(function() { msg.style.display = 'none'; }, 2000);
}

// ── 類別 ──
function renderCatTags() {
  var el = document.getElementById('cattags');
  if (!el) return;
  el.innerHTML = DATA.cats.map(function(c) {
    return '<button onclick="rmCat(\'' + c + '\')">' + c + ' ✕</button>';
  }).join('');
}

function addCat() {
  var v = document.getElementById('newcat').value.trim();
  if (v && DATA.cats.indexOf(v) < 0) { DATA.cats.push(v); save(); renderCatTags(); }
  document.getElementById('newcat').value = '';
}

function rmCat(c) {
  if (!confirm('刪除類別「' + c + '」？')) return;
  DATA.cats = DATA.cats.filter(function(x) { return x !== c; });
  save(); renderCatTags();
}

// ── modal ──
function openAdd() { openModal(null); }
function openEdit(id) { openModal(id); }

function openModal(id) {
  DATA.eid = id || null;
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2, '0'); };
  var td = now.toISOString().split('T')[0];
  var tt = pad(now.getHours()) + ':' + pad(now.getMinutes());

  if (id) {
    var e = null;
    for (var i = 0; i < DATA.exps.length; i++) { if (DATA.exps[i].id === id) { e = DATA.exps[i]; break; } }
    if (!e) return;
    document.getElementById('mtitle').innerHTML = '編輯花費';
    document.getElementById('mfgn').value = e.fgn;
    document.getElementById('mcur').value = e.cur;
    document.getElementById('mrate').value = e.rate;
    document.getElementById('mtwd').value = e.twd;
    document.getElementById('mdate').value = e.date;
    document.getElementById('mtime').value = e.time || '';
    document.getElementById('mpay').value = e.pay;
    document.getElementById('mplace').value = e.place || '';
    document.getElementById('mnote').value = e.note || '';
    document.getElementById('mspread').checked = !!e.spread;
    document.getElementById('spreadrow').style.display = e.spread ? 'block' : 'none';
    document.getElementById('mspd').value = e.spd || 2;
    document.getElementById('msplit').checked = !!e.splitOn;
    document.getElementById('splitwho').style.display = e.splitOn ? 'block' : 'none';
    selCat = e.cat;
  } else {
    document.getElementById('mtitle').innerHTML = '新增花費';
    document.getElementById('mfgn').value = '';
    document.getElementById('mcur').value = 'JPY';
    document.getElementById('mrate').value = '';
    document.getElementById('mtwd').value = '';
    document.getElementById('mdate').value = td;
    document.getElementById('mtime').value = tt;
    document.getElementById('mpay').value = '現金';
    document.getElementById('mplace').value = '';
    document.getElementById('mnote').value = '';
    document.getElementById('mspread').checked = false;
    document.getElementById('spreadrow').style.display = 'none';
    document.getElementById('mspd').value = 2;
    document.getElementById('msplit').checked = false;
    document.getElementById('splitwho').style.display = 'none';
    selCat = DATA.cats[0];
  }

  document.getElementById('mhc').innerHTML = DATA.trip ? DATA.trip.currency : 'TWD';
  document.getElementById('rsrc').innerHTML = '';
  renderCatSel(selCat);
  renderSplitWhoUI();
  document.getElementById('overlay').style.display = 'block';
  fetchRate(0);
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  DATA.eid = null;
}

function renderCatSel(pre) {
  selCat = pre || DATA.cats[0];
  var el = document.getElementById('catsel');
  if (!el) return;
  var html = '';
  for (var i = 0; i < DATA.cats.length; i++) {
    var c = DATA.cats[i];
    html += '<button type="button" class="' + (selCat === c ? 'sel' : '') + '" onclick="pickCat(\'' + c + '\')">' + c + '</button>';
  }
  el.innerHTML = html;
}

function pickCat(c) {
  selCat = c;
  var btns = document.querySelectorAll('#catsel button');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = btns[i].innerHTML === c ? 'sel' : '';
  }
}

function toggleSpread(on) {
  document.getElementById('spreadrow').style.display = on ? 'block' : 'none';
}

function toggleSplit(on) {
  document.getElementById('splitwho').style.display = on ? 'block' : 'none';
  if (on) renderSplitWhoUI();
}

function renderSplitWhoUI() {
  var py = document.getElementById('mpayer');
  var ms = document.getElementById('msplm');
  if (!py || !ms) return;
  if (DATA.members.length === 0) {
    py.innerHTML = '<option>— 請先新增成員 —</option>';
    ms.innerHTML = '<div style="font-size:13px;color:#8e8e93">請先在分帳頁面新增成員</div>';
    return;
  }
  py.innerHTML = DATA.members.map(function(m) { return '<option>' + m + '</option>'; }).join('');
  ms.innerHTML = DATA.members.map(function(m) {
    return '<div class="chkrow"><input type="checkbox" id="sp_' + m + '" checked><label for="sp_' + m + '">' + m + '</label></div>';
  }).join('');
}

function fetchRate(manual) {
  var cur = document.getElementById('mcur').value;
  var hc = DATA.trip ? DATA.trip.currency : 'TWD';
  if (cur === hc) {
    document.getElementById('mrate').value = '1';
    document.getElementById('rsrc').innerHTML = '';
    calcTWD(); return;
  }
  document.getElementById('rsrc').innerHTML = '(載入中)';
  var fb = {JPY:0.2174,USD:32.5,EUR:35.2,KRW:0.024,GBP:41.5,HKD:4.15,CNY:4.48,THB:0.88,SGD:24.1,AUD:20.8};

  fetch('https://api.exchangerate-api.com/v4/latest/' + cur)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var rate = d.rates[hc];
      if (rate) {
        document.getElementById('mrate').value = rate.toFixed(4);
        document.getElementById('rsrc').innerHTML = '(即時)';
        calcTWD();
      } else { throw new Error(); }
    })
    .catch(function() {
      document.getElementById('rsrc').innerHTML = '(估算)';
      if (!manual && fb[cur]) {
        document.getElementById('mrate').value = fb[cur];
        calcTWD();
      } else {
        document.getElementById('rsrc').innerHTML = '(請手動輸入)';
      }
    });
}

function calcTWD() {
  var f = parseFloat(document.getElementById('mfgn').value) || 0;
  var r = parseFloat(document.getElementById('mrate').value) || 0;
  if (f && r) document.getElementById('mtwd').value = (f * r).toFixed(0);
}

function saveExp() {
  var fgn = parseFloat(document.getElementById('mfgn').value) || 0;
  var cur = document.getElementById('mcur').value;
  var rate = parseFloat(document.getElementById('mrate').value) || 0;
  var twd = parseFloat(document.getElementById('mtwd').value) || (fgn * rate);
  var date = document.getElementById('mdate').value;
  var time = document.getElementById('mtime').value;
  if (!fgn || !twd) { alert('請填入金額'); return; }
  var splitOn = document.getElementById('msplit').checked;
  var splitM = [];
  if (splitOn) {
    for (var i = 0; i < DATA.members.length; i++) {
      var cb = document.getElementById('sp_' + DATA.members[i]);
      if (cb && cb.checked) splitM.push(DATA.members[i]);
    }
  }
  var obj = {
    id: DATA.eid || String(Date.now()),
    fgn: fgn, cur: cur, rate: rate, twd: twd,
    date: date, time: time, dt: date + 'T' + (time || '00:00'),
    cat: selCat || '其他',
    pay: document.getElementById('mpay').value,
    place: document.getElementById('mplace').value,
    note: document.getElementById('mnote').value,
    spread: document.getElementById('mspread').checked,
    spd: parseInt(document.getElementById('mspd').value) || 2,
    splitOn: splitOn, splitM: splitM,
    payer: document.getElementById('mpayer').value
  };
  if (DATA.eid) {
    for (var i = 0; i < DATA.exps.length; i++) {
      if (DATA.exps[i].id === DATA.eid) { DATA.exps[i] = obj; break; }
    }
  } else {
    DATA.exps.push(obj);
  }
  save(); closeModal(); renderAll();
}

// ── 分帳 ──
function addMember() {
  var v = document.getElementById('mi').value.trim();
  if (v && DATA.members.indexOf(v) < 0) { DATA.members.push(v); save(); renderSplit(); }
  document.getElementById('mi').value = '';
}

function rmMember(m) {
  DATA.members = DATA.members.filter(function(x) { return x !== m; });
  save(); renderSplit();
}

function renderSplit() {
  var ml = document.getElementById('mlist');
  if (ml) {
    ml.innerHTML = DATA.members.map(function(m) {
      return '<span style="display:inline-flex;align-items:center;gap:6px;background:#e8f4fd;color:#007aff;padding:5px 12px;border-radius:20px;font-size:13px">' +
        m + '<span style="cursor:pointer;font-size:16px;opacity:.7" onclick="rmMember(\'' + m + '\')">×</span></span>';
    }).join('');
  }
  var splits = DATA.exps.filter(function(e) { return e.splitOn && e.splitM && e.splitM.length > 0; });
  var debts = {};
  for (var i = 0; i < splits.length; i++) {
    var e = splits[i];
    var n = e.splitM.length || 1;
    var each = (parseFloat(e.twd) || 0) / n;
    for (var j = 0; j < e.splitM.length; j++) {
      var m = e.splitM[j];
      if (m !== e.payer) {
        var key = m + '->' + e.payer;
        debts[key] = (debts[key] || 0) + each;
      }
    }
  }
  var sr = document.getElementById('settle');
  if (sr) {
    var entries = Object.keys(debts).filter(function(k) { return debts[k] > 0.01; });
    if (entries.length === 0) {
      sr.innerHTML = '<div class="empty">無待結算帳款</div>';
    } else {
      sr.innerHTML = entries.map(function(k) {
        var parts = k.split('->');
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f2f2f7;font-size:14px">' +
          '<span><b>' + parts[0] + '</b> 應付給 <b>' + parts[1] + '</b></span>' +
          '<span class="badge g-badge">' + fmt(debts[k]) + '</span></div>';
      }).join('');
    }
  }
}

// ── CSV ──
function doCSV() {
  var h = ['日期','時間','類別','付款','地點','外幣','幣別','匯率','主貨幣金額','備註'];
  var rows = DATA.exps.map(function(e) {
    return [e.date, e.time||'', e.cat, e.pay, e.place||'', e.fgn, e.cur, e.rate, e.twd, e.note||''];
  });
  var csv = [h].concat(rows).map(function(r) {
    return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'travel.csv'; a.click();
}

function clearAll() {
  if (!confirm('確定清除全部資料？')) return;
  DATA = { trip:null, exps:[], cats:['機票','住宿','交通','餐飲','購物','門票/娛樂','保險/行政','其他'], members:[], eid:null };
  save(); renderAll();
}

function renderAll() {
  renderDash();
  renderList();
  renderCatTags();
  fillSettings();
}

// 點遮罩關閉
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// 啟動
load();
renderAll();
</script>
